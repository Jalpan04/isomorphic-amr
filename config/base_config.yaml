# Hyperparameter and Path Configurations for Unsupervised Cross-Lingual Semantic Parsing

# General active run configuration
experiment:
  id: "exp_001_baseline_gw"
  seed: 42
  device: "cuda" # cuda or cpu
  wandb_offline: true

# Dataset Paths (Relative to workspace root)
paths:
  raw_amr: "data/raw/amr3"
  multilingual_amr: "data/raw/multilingual_amr"
  monolingual: "data/raw/monolingual"
  processed_amr: "data/processed/amr_graphs_pyg"
  processed_dep: "data/processed/dep_graphs_pyg"
  relation_vocab: "data/processed/relation_vocab.json"
  concept_vocab: "data/processed/concept_vocab.json"

# Node embedding configuration
embeddings:
  model_name: "xlm-roberta-base"
  dimension: 768

# Shared Graph Attention Network (GAT) Encoder
encoder:
  in_channels: 768
  hidden_channels: 256
  out_channels: 256
  heads: 4
  dropout: 0.1
  num_layers: 2

# Fused Gromov-Wasserstein Alignment settings
alignment:
  metric: "cosine"     # cosine or euclidean
  loss_fun: "square_loss" # square_loss or kl_loss
  alpha: 0.5            # weight balance: 0 is node feature similarity only, 1 is graph topology only
  regularization: 0.05  # entropic regularization for OT (if using entropic GW, otherwise standard)

# Training Settings
train:
  batch_size: 32
  epochs: 10
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 100
  reconstruction_weight: 1.0
  gw_weight: 1.0

# Evaluation Settings
eval:
  languages: ["es", "de", "it", "zh"]
  smatch_restarts: 4
